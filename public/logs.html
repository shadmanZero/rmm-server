<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>rackoona · logs</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2310b981' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Cpath d='M4 17l6-6-6-6M12 19h8'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="h-screen overflow-hidden">
    <header
      class="flex flex-shrink-0 flex-wrap items-center justify-between gap-3 border-b border-border bg-surface px-4 py-2.5"
    >
      <div class="flex min-w-0 items-center gap-3">
        <a class="btn btn--ghost" href="/" aria-label="Back to devices">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
          <span class="hidden sm:inline">Devices</span>
        </a>
        <div class="h-5 w-px bg-border" aria-hidden="true"></div>
        <span class="text-sm font-semibold tracking-tight">Live logs</span>
        <span id="conn-state" class="pill">connecting…</span>
        <span id="counts" class="hidden text-xs text-faint sm:inline">0 lines</span>
      </div>

      <div class="flex flex-wrap items-center gap-2">
        <!-- Level filter chips -->
        <div
          id="level-filter"
          class="flex items-center gap-1 rounded-lg border border-border bg-surface-2 p-1"
          role="group"
          aria-label="Filter by level"
        >
          <button class="chip" data-level="trace" type="button" aria-pressed="true">trace</button>
          <button class="chip" data-level="info" type="button" aria-pressed="true">info</button>
          <button class="chip" data-level="warn" type="button" aria-pressed="true">warn</button>
          <button class="chip" data-level="error" type="button" aria-pressed="true">error</button>
        </div>

        <select id="source-filter" class="field w-auto py-1.5 text-xs" aria-label="Filter by source">
          <option value="">All sources</option>
        </select>

        <input
          id="search"
          type="search"
          placeholder="Filter text…"
          class="field w-40 py-1.5 text-xs"
          aria-label="Filter by text"
        />

        <button id="pause-btn" class="btn btn--ghost" type="button" aria-pressed="false">
          <span id="pause-label">Pause</span>
          <span id="pause-count" class="hidden rounded-full bg-accent/20 px-1.5 text-[11px] text-accent"></span>
        </button>
        <button id="clear-btn" class="btn btn--ghost" type="button">Clear</button>
        <button id="logout-btn" class="btn btn--ghost px-3 py-1.5 text-xs" type="button">
          Sign out
        </button>
      </div>
    </header>

    <main class="relative min-h-0 flex-1">
      <div
        id="log-list"
        class="h-full overflow-y-auto px-3 py-2 font-mono text-[12.5px] leading-relaxed"
        tabindex="0"
      ></div>

      <div
        id="empty"
        class="pointer-events-none absolute inset-0 flex items-center justify-center text-sm text-faint"
      >
        Waiting for log activity…
      </div>

      <button
        id="jump-btn"
        class="btn btn--ghost absolute bottom-4 left-1/2 hidden -translate-x-1/2"
        type="button"
      >
        Jump to latest ↓
      </button>
    </main>

    <div id="toast" class="toast" hidden></div>

    <script type="module" src="/logs.js"></script>
  </body>
</html>
