<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>· remote desktops</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2310b981' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='2' y='3' width='20' height='14' rx='2'/%3E%3Cpath d='M8 21h8M12 17v4'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body>
    <header
      class="sticky top-0 z-10 flex items-center justify-between gap-4 border-b border-border bg-bg/80 px-5 py-3 backdrop-blur-md sm:px-8"
    >
      <div class="flex items-center gap-3">
        <span
          class="grid h-9 w-9 place-items-center rounded-lg border border-border-strong bg-surface-2 text-accent"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="18"
            height="18"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <rect x="2" y="3" width="20" height="14" rx="2" />
            <path d="M8 21h8M12 17v4" />
          </svg>
        </span>
        <div class="leading-tight">
          <h1 class="text-sm font-semibold tracking-tight">shadmanZero</h1>
          <p class="hidden text-xs text-faint sm:block">remote access control plane</p>
        </div>
      </div>

      <div class="flex shrink-0 items-center gap-3">
        <div class="flex items-center gap-2">
          <span id="conn-dot" class="dot dot--ok"></span>
          <span
            id="conn-text"
            class="hidden text-[11px] font-medium uppercase tracking-[0.14em] text-faint transition-colors sm:inline"
            >Connected</span
          >
        </div>
        <span class="hidden h-5 w-px bg-border sm:inline-block"></span>
        <a href="/logs.html" class="btn btn--ghost px-3 py-1.5 text-xs" title="Live control-plane + agent logs">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="14"
            height="14"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M4 17l6-6-6-6M12 19h8" />
          </svg>
          Logs
        </a>
        <span id="account" class="hidden text-xs text-muted sm:inline"></span>
        <button id="logout-btn" class="btn btn--ghost px-3 py-1.5 text-xs" type="button">
          Sign out
        </button>
      </div>
    </header>

    <main class="mx-auto w-full max-w-5xl flex-1 px-5 py-8 sm:px-8 sm:py-10">
      <div class="mb-6 flex items-end justify-between gap-4">
        <div>
          <h2 class="text-2xl font-semibold tracking-tight">Devices</h2>
          <p id="device-count" class="mt-1 text-sm text-muted">—</p>
        </div>
        <button id="refresh-btn" class="btn btn--ghost" type="button">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M3 12a9 9 0 0 1 15-6.7L21 8" />
            <path d="M21 3v5h-5" />
            <path d="M21 12a9 9 0 0 1-15 6.7L3 16" />
            <path d="M3 21v-5h5" />
          </svg>
          Refresh
        </button>
      </div>

      <div
        id="devices"
        class="grid grid-cols-[repeat(auto-fill,minmax(280px,1fr))] gap-4"
      ></div>

      <div
        id="empty"
        class="mx-auto flex max-w-md flex-col items-center gap-4 py-20 text-center"
        hidden
      >
        <span
          class="grid h-14 w-14 place-items-center rounded-2xl border border-border bg-surface text-faint"
        >
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="26"
            height="26"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="1.7"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <rect x="2" y="3" width="20" height="14" rx="2" />
            <path d="M8 21h8M12 17v4" />
          </svg>
        </span>
        <div class="space-y-1.5">
          <h3 class="text-base font-semibold text-content">No devices enrolled</h3>
          <p class="text-sm text-muted">
            Run the agent and point it at this control plane to enroll your first device.
          </p>
        </div>
        <code
          id="connect-hint"
          class="max-w-full break-all rounded-lg border border-border bg-surface-2 px-3.5 py-2 text-center font-mono text-xs text-content"
          >agent connect</code
        >
      </div>
    </main>

    <div id="toast" class="toast" hidden></div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
