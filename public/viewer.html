<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>rackoona · viewer</title>
    <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'%3E%3Crect width='32' height='32' rx='8' fill='%236366f1'/%3E%3Ctext x='16' y='22' font-size='18' text-anchor='middle' fill='white' font-family='monospace'%3ER%3C/text%3E%3C/svg%3E" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="viewer-body">
    <header class="topbar topbar--viewer">
      <div class="viewer__left">
        <a class="btn btn--ghost" href="/">← Devices</a>
        <span id="viewer-name" class="viewer__name">device</span>
        <span id="viewer-state" class="pill">connecting…</span>
      </div>
      <div class="viewer__actions">
        <label class="toggle">
          <input id="scale-toggle" type="checkbox" checked />
          <span>Fit</span>
        </label>
        <button id="cad-btn" class="btn btn--ghost" type="button" title="Send Ctrl+Alt+Del">
          Ctrl+Alt+Del
        </button>
        <button id="disconnect-btn" class="btn btn--danger" type="button">Disconnect</button>
      </div>
    </header>

    <div id="screen" class="screen"></div>

    <div id="toast" class="toast" hidden></div>

    <script type="module" src="/viewer.js"></script>
  </body>
</html>
