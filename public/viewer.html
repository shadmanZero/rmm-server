<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <title>rackoona · viewer</title>
    <link
      rel="icon"
      href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 24 24' fill='none' stroke='%2310b981' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'%3E%3Crect x='2' y='3' width='20' height='14' rx='2'/%3E%3Cpath d='M8 21h8M12 17v4'/%3E%3C/svg%3E"
    />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="h-screen overflow-hidden">
    <header
      class="flex flex-shrink-0 items-center justify-between gap-4 border-b border-border bg-surface px-4 py-2.5"
    >
      <div class="flex min-w-0 items-center gap-3">
        <a class="btn btn--ghost" href="/" aria-label="Back to devices">
          <svg
            xmlns="http://www.w3.org/2000/svg"
            width="15"
            height="15"
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
            stroke-linecap="round"
            stroke-linejoin="round"
            aria-hidden="true"
          >
            <path d="M19 12H5M12 19l-7-7 7-7" />
          </svg>
          <span class="hidden sm:inline">Devices</span>
        </a>
        <div class="h-5 w-px bg-border" aria-hidden="true"></div>
        <span
          id="viewer-name"
          class="max-w-[28vw] truncate text-sm font-semibold tracking-tight"
          >device</span
        >
        <span id="viewer-state" class="pill">connecting…</span>
        <span id="viewer-stats" class="hidden items-center gap-1.5 md:inline-flex" hidden>
          <span
            class="stat"
            id="stat-latency"
            title="Round-trip latency (request → first response)"
          >
            <span class="stat__dot"></span><span id="stat-latency-val">—</span>
          </span>
          <span class="stat" id="stat-fps" title="Frames received per second">
            <span id="stat-fps-val">—</span><span class="stat__unit">fps</span>
          </span>
          <span class="stat hidden lg:inline-flex" id="stat-net" title="Inbound bandwidth">
            <span id="stat-net-val">—</span>
          </span>
          <span class="stat hidden lg:inline-flex" id="stat-res" title="Remote framebuffer resolution">
            <span id="stat-res-val">—</span>
          </span>
        </span>
      </div>

      <div class="flex items-center gap-3">
        <label class="flex cursor-pointer select-none items-center gap-2 text-sm text-muted">
          <span class="switch">
            <input id="scale-toggle" type="checkbox" checked />
            <span class="switch__track"></span>
            <span class="switch__thumb"></span>
          </span>
          <span class="hidden sm:inline">Fit</span>
        </label>
        <button
          id="cad-btn"
          class="btn btn--ghost hidden font-mono sm:inline-flex"
          type="button"
          title="Send Ctrl+Alt+Del"
        >
          Ctrl+Alt+Del
        </button>
        <button id="disconnect-btn" class="btn btn--danger" type="button">Disconnect</button>
      </div>
    </header>

    <div id="screen" class="flex min-h-0 flex-1 items-center justify-center overflow-hidden bg-black"></div>

    <div id="toast" class="toast" hidden></div>

    <script type="module" src="/viewer.js"></script>
  </body>
</html>
